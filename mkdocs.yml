site_name: "wuhulamb's wiki"
site_url: https://wuhulamb.github.io/wiki/

nav:
  - Home: index.md
  - Bookmarks: bookmarks.md
  - Network:
      - Proxy: network/proxy.md
      - Wireshark: network/wireshark.md
  - Video:
      - M3U8: video/m3u8.md
      - FFmpeg: video/ffmpeg.md
  - Bash:
      - Common: bash/common.md
      - Git: bash/git.md
      - PDF: bash/pdf.md
      - JPG: bash/jpg.md
      - ogr: bash/ogr.md
  - Prompt:
      - Literature: prompt/literature.md
  - Links:
      - CS: links/cs.md
      - Tools: links/tools.md

theme:  
  name: material
  locale: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
